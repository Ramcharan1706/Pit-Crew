services:
  - type: web
    name: pitcrew-api
    runtime: node
    plan: standard
    buildCommand: npm ci --include=dev && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: pitcrew-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: "https://pit-crew-silk.vercel.app"
      - key: ALGOD_SERVER
        value: https://testnet-api.algonode.cloud
      - key: ALGOD_PORT
        value: ""
      - key: ALGOD_TOKEN
        value: ""
      - key: INDEXER_SERVER
        value: https://testnet-api.algonode.cloud
      - key: INDEXER_PORT
        value: ""
      - key: AUTH_SESSION_TTL_MS
        value: "3600000"
      - key: AUTH_REQUIRED
        value: "false"
      - key: COINGECKO_API_KEY
        value: ""

databases:
  - name: pitcrew-db
    databaseName: pitcrew_production
    version: "15"
    plan: standard
