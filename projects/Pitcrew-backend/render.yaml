services:
  - type: web
    name: pitcrew-api
    runtime: node
    plan: standard
    startCommand: npm run build && bash start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: pitcrew-db
          property: connectionString
      - key: ALGOD_SERVER
        value: https://testnet-api.algonode.cloud
      - key: ALGOD_NETWORK
        value: testnet
      - key: INDEXER_SERVER
        value: https://testnet-idx.algonode.cloud
      - key: ALLOWED_ORIGINS
        # Environment-specific; set via Render dashboard
        sync: false
      - key: AUTH_SESSION_TTL_MS
        value: "3600000"
      - key: AUTH_REQUIRED
        value: "false"

databases:
  - name: pitcrew-db
    databaseName: pitcrew_production
    version: "15"
    plan: standard
